---
name: Docker Hub Description
# Sync README.md to the Docker Hub repository "Overview". Runs only when the README
# (or this workflow) changes, so it never triggers an image rebuild — that's ci.yml's job.
on:
  push:
    branches:
      - main
    paths:
      - README.md
      - .github/workflows/dockerhub-description.yml
  workflow_dispatch:

jobs:
  description:
    name: Update Docker Hub overview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push README to Docker Hub
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # GitHub repo is "docker-ros2-template" but the Docker Hub repo is "ros2-template",
          # so set this explicitly (the action otherwise defaults to the GitHub repo name).
          repository: frankjoshua/ros2-template
          short-description: "ROS 2 template — VS Code dev container + multi-arch deploy image"
